version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: pytestdemo_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pytestdemodb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: pytestdemo_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - MYSQL_HOST=db
      - MYSQL_DB=pytestdemodb
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=apppassword
      - MYSQL_PORT=3306
      - SECRET_KEY=khoa_bi_mat_production_sieu_bao_mat_123456
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
